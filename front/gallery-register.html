    <div class="main-wrapper">
        <div class="pin-builder">
            <!-- Builder Header -->
            <div class="builder-header">
                <div class="builder-header-left">
                </div>
                <button class="publish-btn" id="publishBtn">게시</button>
            </div>

            <!-- Builder Body -->
            <div class="builder-body">
                <!-- Left: Upload -->
                <div class="upload-section">
                    <div class="upload-area" id="galleryUploadArea">
                        <div class="upload-placeholder">
                            <div class="upload-icon">
                                <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z" transform="rotate(-90 12 12)"/></svg>

                        </div>
                        <img class="preview-image" id="galleryPreviewImage" alt="갤러리 미리보기" style="display:none;">
                        <input type="file" id="galleryFileInput" accept="image/*">
                    </div>
                </div>

                <!-- Right: Form -->
                <div class="form-section">
                    <div class="form-group">
                        <label>제목</label>
                        <input type="text" id="galleryTitleInput" placeholder="제목을 추가하세요." maxlength="100">
                    </div>

                    <div class="form-group">
                        <label>설명</label>
                        <textarea id="galleryDescriptionInput" placeholder="예술관에 대한 설명을 추가하세요." maxlength="500"></textarea>
                    </div>
                    <div class="tag-section">

                            <input type="text" class="tag-input" id="tagInput" placeholder="태그 검색">
                        </div>
                        <p class="tag-hint">자유롭게 추가 해 보세요.</p>
                    </div>
