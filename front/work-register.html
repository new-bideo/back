    <!-- Main Content -->
    <div class="main-wrapper">
        <div class="pin-builder">
            <!-- Builder Header -->
            <div class="builder-header">
                <div class="builder-header-left">
                </div>
                <button class="publish-btn" id="publishBtn">게시</button>
            </div>

            <!-- Builder Body -->
            <div class="builder-body">
                <!-- Left: Upload -->
                <div class="upload-section">
                    <div class="upload-area" id="uploadArea">
                        <div class="upload-placeholder">
                            <div class="upload-icon">
                                <svg viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z" transform="rotate(-90 12 12)"/></svg>
                            </div>
                            <p class="upload-text">파일을 선택하거나 여기로<br>드래그 앤 드롭하세요</p>
                            <p class="upload-subtext">1280 × 720 영상 또는 이미지 파일을<br>업로드할 수 있습니다.</p>
                        </div>
                        <video class="preview-image" id="previewVideo" muted playsinline style="display:none;"></video>
                        <img class="preview-image" id="previewImage" alt="미리보기" style="display:none;">
                        <input type="file" id="fileInput" accept="video/*,image/*">
                    </div>
                    <button class="save-from-url" id="saveFromUrl" type="button">미리보기</button>
                </div>

                <!-- Right: Form -->
                <div class="form-section">
                    <div class="form-group">
                        <label>제목</label>
                        <input type="text" id="titleInput" placeholder="제목을 추가해주세요." maxlength="100">
                    </div>

                    <div class="form-group">
                        <label>설명</label>
                        <textarea id="descriptionInput" placeholder="작품에 대한 설명을 추가하세요." maxlength="500"></textarea>
                    </div>

                    <div class="form-group">
                        <label>가격</label>
                        <div class="toggle-row">
                                <div class="toggle-row-text">
                                    <span>거래</span>
                                </div>
                                <label class="toggle-switch">
                                    <input type="checkbox" id="tradeToggle">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        <input type="text" id="priceInput" placeholder="가격 설정" disabled>
                    </div>
                    <div class="tag-section">
                        <div class="tag-input-wrapper" id="tagWrapper">
                            <label style="font-size:12px;color:#111;width:100%;margin-bottom:2px;">태그된 주제 (0개)</label>
                            <input type="text" class="tag-input" id="tagInput" placeholder="태그 검색">
                        </div>
                        <p class="tag-hint">걱정하지 마세요. 사람들에게 태그는 보여지지 않습니다.</p>
                    </div>

                    <div class="product-tag-section">
                        <label>예술관</label>
                        <div class="gallery-select-wrap" id="gallerySelectWrap">
                            <select class="gallery-select" id="gallerySelect">
                                <option value="">선택 안 함</option>
                                <option>예술관</option>
                            </select>
                            <button class="gallery-select-trigger" id="gallerySelectTrigger" type="button" aria-haspopup="listbox" aria-expanded="false">
                                <span class="gallery-select-trigger-text">선택 안 함</span>
                                <svg class="gallery-select-icon" viewBox="0 0 24 24" aria-hidden="true">
                                    <path d="M7 10l5 5 5-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                                </svg>
                            </button>
                            <ul class="gallery-select-list" id="gallerySelectList" role="listbox">
                                <li class="gallery-select-option" data-value="" role="option">선택 안 함</li>
                                <li class="gallery-select-option"
                                    role="option">예술관</li>
                            </ul>
                        </div>
                    </div>

                    <div class="more-options">
                        <button class="more-options-toggle" id="moreToggle">
                            추가 옵션
                            <svg viewBox="0 0 24 24"><path d="M20 9l-8 8-8-8"/></svg>
                        </button>
                        <div class="more-options-content" id="moreContent">
                            <div class="toggle-row">
                                <div class="toggle-row-text">
                                    <span>옥션 등록하기</span>
                                    <span>경매에 등록할 수 있습니다.</span>
                                </div>
                                <label class="toggle-switch">
                                    <input type="checkbox" id="auctionToggle">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div class="legal-notice">
                        불법 촬영 콘텐츠 등을 게시하는 경우 Pinterest는 한국 전기통신사업법 제22-5(1)조에 미리 해당 콘텐츠의 액세스를 삭제하거나 차단할 수 있으며, 사용자는 관련 법률 및 <a href="#">규정</a>에 따라 처벌을 받을 수 있습니다.
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="work-preview-modal" id="workPreviewModal" style="display:none;">
        <div class="work-preview-backdrop" id="workPreviewBackdrop"></div>
        <div class="work-preview-sheet">
            <button class="work-preview-close" id="workPreviewClose" type="button">&times;</button>
            <div class="work-preview-media" id="workPreviewMedia"></div>
            <div class="work-preview-content">
                <h3 id="workPreviewTitle">제목</h3>
                <p id="workPreviewDescription">설명</p>
                <div id="workPreviewTags"></div>
                <div id="workPreviewPrice"></div>
            </div>
        </div>
    </div>
