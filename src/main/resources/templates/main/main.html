<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDEO | 영상 경매 & 거래 플랫폼</title>
    <link rel="icon" href="static/images/BIDEO_LOGO/BIDEO_favicon.png">
    <link rel="stylesheet" href="static/css/common/font.css">
    <link rel="stylesheet" href="static/css/common/global.css">
    <link rel="stylesheet" href="static/css/main/main.css">
    <link rel="stylesheet" href="static/css/main/navigation.css">
    <link rel="stylesheet" href="static/css/main/modal-shared.css">
    <link rel="stylesheet" href="static/css/main/auth-modal.css">
    <link rel="stylesheet" href="static/css/main/signup-modal.css">
    <style>
        :root {
            --gestalt-theme: calico;
            --gestalt-color-scheme: lightMode;
            --base-font-family-default-latin: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }
    </style>
</head>

<body class="app-root" style="margin:0">
    <div id="__PWS_ROOT__" class="app-root__mount">
        <div class="main-page-shell app-shell layout-box">
            <div class="main-page-frame app-shell__frame layout-box">

                <!-- ===== 상단 헤더 (검색바 + 프로필) ===== -->
                <div role="banner" class="main-header main-header__layout layout-box">
                    <div data-test-id="header" id="HeaderContent" class="main-header__bar layout-box layout-top-zero layout-right-zero layout-fixed">
                        <div class="main-header__surface layout-box">
                            <div data-test-id="header-background" class="main-header__background layout-box size-full width-full surface-default">
                                <div class="main-header__background-inner layout-box">
                                    <div class="main-header__row flex-row spacing-inline-zero spacing-block-zero justify-start flex-column">
                                        <div class="main-header__content layout-box section-padding-x-400 size-full width-full items-center flex-grow flex-row-container">
                                            <div data-test-id="button-container"
                                                class="main-header__actions layout-box size-full width-full items-center flex-row-container">
                                                <!-- 검색 -->
                                                <div data-test-id="search-box-container" id="searchBoxContainer"
                                                    class="search-bar main-header__search search-bar__container layout-box spacing-inline-end-200 search-box-inline-zero spacing-block-start-zero flex-grow">
                                                    <div class="search-bar__shell layout-box rounded-field-surface flex-row-container">
                                                        <div class="search-bar__inner layout-box position-relative items-center flex-grow flex-row-container">
                                                            <div class="search-bar__icon-slot layout-box flex-fixed spacing-inline-end-200">
                                                                <svg aria-label="검색 아이콘" class="icon-svg display-block icon-color-subtle"
                                                                    height="16" role="img" viewBox="0 0 24 24" width="16">
                                                                    <path
                                                                        d="M17.33 18.74a10 10 0 1 1 1.41-1.41l4.47 4.47-1.41 1.41zM11 3a8 8 0 1 0 0 16 8 8 0 0 0 0-16">
                                                                    </path>
                                                                </svg>
                                                            </div>
                                                            <div class="search-bar__input-wrap layout-box flex-grow">
                                                                <input aria-label="검색" autocomplete="off"
                                                                    class="search-bar__input" data-test-id="search-box-input" id="search-input"
                                                                    placeholder="검색" role="combobox"
                                                                    type="text" value="">
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <!-- 프로필 -->
                                                <div class="profile-menu slot-block">
                                                    <div class="profile-menu__frame layout-box display-block-wrapper">
                                                        <div class="profile-menu__control layout-box">
                                                            <a aria-label="내 프로필"
                                                                class="profile-summary profile-menu__link link-reset text-color-inherit text-no-underline interactive-scale rounded-400 focus-outline-none display-block-link width-full cursor-pointer"
                                                                href="#" tabindex="0">
                                                                <div aria-hidden="true" class="profile-menu__avatar-shell layout-box rounded-400">
                                                                    <div class="profile-menu__avatar-outer layout-box rounded-circle justify-center items-center flex-row-container">
                                                                        <div class="profile-menu__avatar-inner layout-box rounded-circle justify-center items-center flex-row-container">
                                                                            <div class="avatar-frame avatar-size-32">
                                                                                <div class="overflow-hidden-relative rounded-circle will-change-transform">
                                                                                    <div>
                                                                                        <div class="layout-box position-relative avatar-bg">
                                                                                            <img alt="내 프로필"
                                                                                                class="profile-avatar-image"
                                                                                                src="static/images/BIDEO_LOGO/BIDEO_favicon.png">
                                                                                        </div>
                                                                                    </div>
                                                                                    <div class="avatar-overlay"></div>
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </a>
                                                        </div>
                                                    </div>
                                                </div>
                                                <!-- 계정 드롭다운 -->
                                                <div class="account-menu slot-block">
                                                    <div class="account-menu__frame layout-box display-block-wrapper">
                                                        <div class="account-menu__control layout-box">
                                                            <button aria-expanded="false" aria-haspopup="true"
                                                                aria-label="계정" class="account-menu-trigger icon-button button-reset"
                                                                data-test-id="header-accounts-options-button" tabindex="0"
                                                                type="button">
                                                                <div class="button-reset-inner interactive-scale cursor-pointer-inner">
                                                                    <div class="account-menu__icon icon-container rounded-200 icon-surface-transparent">
                                                                        <svg aria-hidden="true" class="icon-svg display-block icon-color-subtle"
                                                                            height="12" role="img" viewBox="0 0 24 24"
                                                                            width="12">
                                                                            <path
                                                                                d="M23.7 8.7 12 20.42.3 8.71l1.4-1.42L12 17.6 22.3 7.3z">
                                                                            </path>
                                                                        </svg>
                                                                    </div>
                                                                </div>
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 좌측 사이드 네비게이션은 navigation.html로 분리됨 -->

                <!-- ===== 메인 콘텐츠 영역 ===== -->
                <div class="appContent app-content" role="main">
                    <div class="layout-box appViewport app-viewport">
                        <div class="mainContainer feed-shell">
                            <div id="masonry"></div>
                            <div id="loader" class="loader loader--hidden">로딩 중...</div>
                        </div>

                        <!-- ===== 핀 상세 Closeup 뷰 ===== -->
                        <div id="closeupView" class="closeup" style="display:none">
                            <div class="closeup__shell">
                                <div class="closeup__back-float">
                                    <button class="closeup__back-btn" onclick="closeCloseupView()" aria-label="뒤로가기">
                                        <svg aria-hidden="true" height="24" role="img" viewBox="0 0 24 24" width="24">
                                            <path d="m4.41 13 6.3 6.3-1.42 1.4L.6 12l8.7-8.7 1.42 1.4L4.4 11H24v2z"></path>
                                        </svg>
                                    </button>
                                </div>
                                <div class="closeup__content-masonry">
                                    <div class="closeup__primary-column">
                                        <section class="closeup__hero-card">
                                            <div class="closeup__media-column">
                                                <div class="closeup__image-stage">
                                                    <div class="closeup__image-wrap">
                                                        <img class="closeup__image" src="" alt="">
                                                        <div class="closeup__image-overlay">
                                                            <div class="closeup__overlay-bottom">
                                                                <button class="closeup__overlay-pill" aria-label="탐색">
                                                                    <span>탐색</span>
                                                                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M19.64.62a5 5 0 0 0 3.74 3.74l.62.14v1l-.62.14a5 5 0 0 0-3.74 3.74l-.14.62h-1l-.14-.62a5 5 0 0 0-3.74-3.74L14 5.5v-1l.62-.14A5 5 0 0 0 18.36.62L18.5 0h1zM11 19a8 8 0 0 0 7.94-7h2.01c-.2 2.01-1 3.85-2.2 5.33l4.46 4.47-1.41 1.41-4.47-4.47a10 10 0 1 1-2.25-16.88l-3 1.21Q11.53 3 11 3a8 8 0 1 0 0 16"></path></svg>
                                                                </button>
                                                                <button class="closeup__overlay-pill closeup__overlay-pill--icon-only" aria-label="더 크게 보기" onclick="openImageLightbox()">
                                                                    <span>더 크게 보기</span>
                                                                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M23 1v9h-2V4.41l-6.3 6.3-1.4-1.42L19.58 3H14V1zM1 23v-9h2v5.59l6.3-6.3 1.4 1.42L4.42 21H10v2z"></path></svg>
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            <section class="closeup__discussion-section" aria-label="상세 정보와 댓글">
                                                <div class="closeup__info-column">
                                                    <div class="closeup__hero-sticky-bar">
                                                        <div class="closeup__action-bar">
                                                            <div class="closeup__action-left">
                                                                <button class="closeup__icon-btn" aria-label="좋아요" onclick="toggleCloseupLike(this)">
                                                                    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M14.1 5.6A4.47 4.47 0 0 1 22 8.48V9c0 2.18-1.65 4.56-4.1 6.78a35 35 0 0 1-5.9 4.21 35 35 0 0 1-5.9-4.21C3.64 13.56 2 11.18 2 9v-.53a4.47 4.47 0 0 1 7.9-2.86L12 8.12zm-3.47-2.08A6.47 6.47 0 0 0 0 8.47V9c0 6.18 8.97 11.59 11.07 12.76q.43.24.93.24t.93-.24C15.03 20.6 24 15.18 24 9v-.53a6.47 6.47 0 0 0-11.44-4.14L12 5l-.56-.67q-.38-.45-.8-.81"></path></svg>
                                                                </button>
                                                                <span class="closeup__stat-count">112</span>
                                                                <button class="closeup__icon-btn" aria-label="공유" onclick="toggleCloseupShareMenu(event, this)">
                                                                    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M17.7 5.8 12 .08l-5.7 5.7L7.7 7.2 11 3.9V15h2V3.91l3.3 3.3zM2 18v-5H0v5a4 4 0 0 0 4 4h16a4 4 0 0 0 4-4v-5h-2v5a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2"></path></svg>
                                                                </button>
                                                                <button class="closeup__icon-btn" aria-label="더보기" onclick="toggleCloseupMoreMenu(event, this)">
                                                                    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M2.5 9.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5m9.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5m9.5 0a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5"></path></svg>
                                                                </button>
                                                            </div>
                                                            <div class="closeup__action-right">
                                                                <button class="closeup__visit-btn" type="button" onclick="focusCloseupDetails()">상세 보기</button>
                                                                <button class="closeup__save-btn" onclick="toggleSave(event, this)">찜</button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div class="closeup__title-section">
                                                        <h1 class="closeup__title"></h1>
                                                        <div class="closeup__description">
                                                            <p class="closeup__description-text"></p>
                                                        </div>
                                                    </div>
                                                    <div class="closeup__creator">
                                                        <img class="closeup__creator-avatar" src="" alt="">
                                                        <div class="closeup__creator-copy">
                                                            <div class="closeup__creator-name-row">
                                                                <a class="closeup__creator-name" href="#">크리에이터</a>
                                                                <div class="closeup__creator-badges"></div>
                                                            </div>
                                                            <p class="closeup__creator-handle"></p>
                                                        </div>
                                                        <button class="closeup__creator-follow" type="button" onclick="toggleFollow(this)">팔로우</button>
                                                    </div>
                                                </div>
                                                <div class="closeup__divider"></div>
                                                <div class="closeup__comments">
                                                    <button class="closeup__collapsible-header" onclick="toggleCloseupCollapsible(this)">
                                                        아직 댓글이 없습니다
                                                        <svg class="closeup__collapsible-arrow" viewBox="0 0 24 24" width="16" height="16"><path d="M23.7 8.7 12 20.42.3 8.71l1.4-1.42L12 17.6 22.3 7.3z"></path></svg>
                                                    </button>
                                                    <div class="closeup__collapsible-content">
                                                        <p class="closeup__comments-empty">댓글을 추가하고 대화를 시작하세요.</p>
                                                    </div>
                                                </div>
                                                <div class="closeup__comment-composer">
                                                    <div class="closeup__comment-box">
                                                        <div class="closeup__comment-input" contenteditable="true" role="textbox" aria-label="댓글 입력" data-placeholder="댓글을 추가하고 대화를 시작하세요."></div>
                                                        <div class="closeup__comment-toolbar">
                                                            <div class="closeup__toolbar-right">
                                                                <button class="closeup__submit-btn" aria-label="게시">
                                                                    <svg viewBox="0 0 24 24" width="16" height="16">
                                                                        <path d="M4.07 1.37a2.1 2.1 0 0 0-2.8 2.59L3.94 12l-2.69 8.04a2.1 2.1 0 0 0 2.81 2.6l18.1-7.7A3 3 0 0 0 24 12.18v-.36a3 3 0 0 0-1.83-2.76zm-.89 1.86a.1.1 0 0 1 .1-.02l18.11 7.7a1 1 0 0 1 .61.91v.36a1 1 0 0 1-.6.92L3.28 20.8a.1.1 0 0 1-.13-.12L5.72 13H14v-2H5.72L3.16 3.33a.1.1 0 0 1 .02-.1"></path>
                                                                    </svg>
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </section>
                                        </section>
                                        
                                        <section class="closeup__below-feed-section" aria-label="추가 게시물">
                                            <div id="closeupBelowPins" class="closeup__below-feed"></div>
                                            <div id="closeupLoader" class="loader loader--hidden closeup__feed-loader">로딩 중...</div>
                                        </section>
                                    </div>
                                    <div class="closeup__related-column">
                                        <div id="closeupRelatedPins" class="closeup__related-feed"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
<script src="static/js/main/modal-shared.js"></script>
<script src="static/js/main/navigation.js"></script>
<script src="static/js/main/main.js"></script>
<script src="static/js/main/closeup.js"></script>
<script src="static/js/main/auth-modal.js"></script>
<script src="static/js/main/signup-modal.js"></script>
</html>
