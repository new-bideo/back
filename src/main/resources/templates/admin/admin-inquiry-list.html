<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIDEO Admin - 문의 관리 목록</title>
    <link rel="icon" type="image/png" th:href="@{/static/images/BIDEO_LOGO/BIDEO_favicon.png}" href="/static/images/BIDEO_LOGO/BIDEO_favicon.png">
    <link rel="stylesheet" th:href="@{/static/css/common/global.css}" href="/static/css/common/global.css">
    <link rel="stylesheet" th:href="@{/static/css/common/font.css}" href="/static/css/common/font.css">
    <link rel="stylesheet" th:href="@{/static/css/admin/admin-common.css}" href="/static/css/admin/admin-common.css">
    <link rel="stylesheet" th:href="@{/static/css/admin/admin-style.css}" href="/static/css/admin/admin-style.css">
    <link rel="stylesheet" th:href="@{/static/css/admin/admin-util.css}" href="/static/css/admin/admin-util.css">
    <link rel="stylesheet" th:href="@{/static/css/admin/admin-modal.css}" href="/static/css/admin/admin-modal.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div th:replace="~{admin/admin-lnb :: adminLnb('inquiries')}"></div>

<main class="main-content">
    <div class="breadcrumbs">
        <span class="current">문의 관리 목록</span>
    </div>

    <header class="mb-32">
        <h1 class="fs-24 fw-800 text-main">문의 관리 목록</h1>
        <p class="text-sub fs-14">BIDEO 서비스 이용 관련 고객 문의 사항을 확인하고 답변을 관리합니다.</p>
    </header>

    <section class="content-card">
        <div class="list-controls">
            <div class="filter-group">
                <a class="btn-filter" th:classappend="${search.status == null or search.status == ''} ? ' active' : ''"
                   th:href="@{/admin/inquiries}">전체</a>
                <a class="btn-filter" th:classappend="${search.status == 'PENDING'} ? ' active' : ''"
                   th:href="@{/admin/inquiries(status='PENDING')}">답변 대기</a>
                <a class="btn-filter" th:classappend="${search.status == 'ANSWERED'} ? ' active' : ''"
                   th:href="@{/admin/inquiries(status='ANSWERED')}">답변 완료</a>
            </div>
        </div>

        <table class="bideo-table">
            <thead>
            <tr>
                <th class="text-center col-id">번호</th>
                <th class="text-center col-flexible">문의 내용</th>
                <th class="text-center" style="width: 180px;">작성자</th>
                <th class="text-center col-date">등록일</th>
                <th class="text-center col-status">상태</th>
                <th class="text-center col-action">상세</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(inquiries)}">
                <td colspan="6" class="text-center text-muted">조회된 문의가 없습니다.</td>
            </tr>
            <tr th:each="inquiry, stat : ${inquiries}">
                <td class="text-center col-id" th:text="${#lists.size(inquiries) - stat.index}">1</td>
                <td class="fw-700 text-center col-flexible">
                    <div class="text-truncate-2" th:text="${inquiry.content}">문의 내용</div>
                </td>
                <td class="text-center" th:text="${inquiry.memberNickname != null ? inquiry.memberNickname + ' (' + inquiry.memberEmail + ')' : '비회원 문의'}">작성자</td>
                <td class="text-center col-date text-muted"
                    th:text="${inquiry.createdDatetime != null ? #temporals.format(inquiry.createdDatetime, 'yyyy.MM.dd HH:mm') : '-'}">2024.03.10 14:20</td>
                <td class="text-center col-status">
                    <span class="status-badge"
                          th:classappend="${inquiry.status == 'ANSWERED'} ? ' status-active' : ' status-pending'"
                          th:text="${inquiry.status == 'ANSWERED'} ? '답변 완료' : '답변 대기'">답변 대기</span>
                </td>
                <td class="text-center col-action">
                    <a class="action-btn" th:href="@{/admin/inquiries/{id}(id=${inquiry.id})}">
                        <i data-lucide="chevron-right"></i>
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>

<script th:src="@{/static/js/admin/admin-service.js}" src="/static/js/admin/admin-service.js"></script>
<script th:src="@{/static/js/admin/admin-layout.js}" src="/static/js/admin/admin-layout.js"></script>
<script th:src="@{/static/js/admin/admin-event.js}" src="/static/js/admin/admin-event.js"></script>
</body>
</html>
