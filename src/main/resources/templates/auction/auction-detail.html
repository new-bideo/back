<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경매 상세 — BIDEO</title>
    <link rel="icon" href="/images/BIDEO_LOGO/BIDEO_favicon.png">
    <link rel="stylesheet" href="/css/common/font.css">
    <link rel="stylesheet" href="/css/common/global.css">
    <link rel="stylesheet" href="/css/font.css">
    <link rel="stylesheet" href="/css/main/main.css">
    <link rel="stylesheet" href="/css/main/navigation.css">
    <link rel="stylesheet" href="/css/auction/auction-detail.css">
</head>
<body th:attr="data-work-id=${workId}">

<nav th:replace="~{/common/navigation::navigation}"></nav>

<div class="page">
<div role="banner" class="main-header main-header__layout layout-box auction-detail-header">
    <div data-test-id="header" id="HeaderContent" class="main-header__bar layout-box layout-top-zero layout-right-zero layout-fixed">
        <div class="main-header__surface layout-box">
            <div data-test-id="header-background" class="main-header__background layout-box size-full width-full surface-default">
                <div class="main-header__background-inner layout-box">
                    <div class="main-header__row flex-row spacing-inline-zero spacing-block-zero justify-start flex-column">
                        <div class="main-header__content layout-box section-padding-x-400 size-full width-full items-center flex-grow flex-row-container">
                            <div data-test-id="button-container"
                                 class="main-header__actions layout-box size-full width-full items-center flex-row-container">
                                <div data-test-id="search-box-container" id="searchBoxContainer"
                                     class="search-bar main-header__search search-bar__container layout-box spacing-inline-end-200 search-box-inline-zero spacing-block-start-zero flex-grow">
                                    <div class="search-bar__shell layout-box rounded-field-surface flex-row-container">
                                        <div class="search-bar__inner layout-box position-relative items-center flex-grow flex-row-container">
                                            <div class="search-bar__icon-slot layout-box flex-fixed spacing-inline-end-200">
                                                <svg aria-label="검색 아이콘" class="icon-svg display-block icon-color-subtle"
                                                     height="16" role="img" viewBox="0 0 24 24" width="16">
                                                    <path d="M17.33 18.74a10 10 0 1 1 1.41-1.41l4.47 4.47-1.41 1.41zM11 3a8 8 0 1 0 0 16 8 8 0 0 0 0-16"></path>
                                                </svg>
                                            </div>
                                            <div class="search-bar__input-wrap layout-box flex-grow">
                                                <input aria-label="검색" autocomplete="off"
                                                       class="search-bar__input" data-test-id="search-box-input" id="search-input"
                                                       placeholder="검색" role="combobox"
                                                       type="text" value="">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="profile-menu slot-block">
                                    <div class="profile-menu__frame layout-box display-block-wrapper">
                                        <div class="profile-menu__control layout-box">
                                            <a aria-label="내 프로필"
                                               class="profile-summary profile-menu__link link-reset text-color-inherit text-no-underline interactive-scale rounded-400 focus-outline-none display-block-link width-full cursor-pointer"
                                               href="/profile" tabindex="0">
                                                <div aria-hidden="true" class="profile-menu__avatar-shell layout-box rounded-400">
                                                    <div class="profile-menu__avatar-outer layout-box rounded-circle justify-center items-center flex-row-container">
                                                        <div class="profile-menu__avatar-inner layout-box rounded-circle justify-center items-center flex-row-container">
                                                            <div class="avatar-frame avatar-size-32">
                                                                <div class="overflow-hidden-relative rounded-circle will-change-transform">
                                                                    <div>
                                                                        <div class="layout-box position-relative avatar-bg">
                                                                            <img alt="내 프로필"
                                                                                 class="profile-avatar-image"
                                                                                 src="/images/BIDEO_LOGO/BIDEO_favicon.png">
                                                                        </div>
                                                                    </div>
                                                                    <div class="avatar-overlay"></div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </a>
                                        </div>
                                    </div>
                                </div>
                                <div class="account-menu slot-block">
                                    <div class="account-menu__frame layout-box display-block-wrapper">
                                        <div class="account-menu__control layout-box">
                                            <button aria-expanded="false" aria-haspopup="true"
                                                    aria-label="계정" class="account-menu-trigger icon-button button-reset"
                                                    data-test-id="header-accounts-options-button" tabindex="0"
                                                    type="button">
                                                <div class="button-reset-inner interactive-scale cursor-pointer-inner">
                                                    <div class="account-menu__icon icon-container rounded-200 icon-surface-transparent">
                                                        <svg aria-hidden="true" class="icon-svg display-block icon-color-subtle"
                                                             height="12" role="img" viewBox="0 0 24 24"
                                                             width="12">
                                                            <path d="M23.7 8.7 12 20.42.3 8.71l1.4-1.42L12 17.6 22.3 7.3z"></path>
                                                        </svg>
                                                    </div>
                                                </div>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<div class="detail-grid">

    <!-- ══════════════════════════════
         왼쪽: 영상 + 작품 정보
    ══════════════════════════════ -->
    <div class="col-main">

        <!-- 영상 플레이어 -->
        <div class="player-wrap">
            <div id="auctionMainMedia"></div>
        </div>

        <!-- 썸네일 갤러리 스트립 -->
        <div class="thumb-strip" id="auctionThumbStrip"></div>

        <!-- 작품 제목 + 메타 -->
        <div class="work-header">
            <h1 class="work-title" id="auctionWorkTitle">작품 제목</h1>
            <div class="work-meta">
                <!-- 업로드 날짜 -->
                <div class="meta-item">
                    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    <span id="auctionUploadDate">업로드 날짜</span>
                </div>
                <span class="meta-sep">·</span>
                <!-- 조회수 -->
                <div class="meta-item">
                    <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    <span id="auctionViewCount">조회수 0회</span>
                </div>
                <!-- 좋아요 / 공유 -->
                <div class="work-actions">
                    <button class="action-btn action-btn--disabled" id="likeBtn" type="button" disabled aria-disabled="true">
                        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                        <span id="likeCount">0</span>
                    </button>
                    <button class="action-btn" id="shareBtn" type="button">
                        <svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                        공유
                    </button>
                </div>
            </div>
        </div>

        <!-- 아티스트 / 크리에이터 프로필 -->
        <div class="creator-section">
            <div class="creator-avatar" id="auctionCreatorAvatar">B</div>
            <div class="creator-info">
                <div class="creator-name" id="auctionCreatorName">작가명</div>
                <div class="creator-sub" id="auctionCreatorSub">경매 진행 중</div>
                <div class="creator-tags" id="auctionCreatorTags"></div>
            </div>
            <button class="btn-follow">+ 팔로우</button>
        </div>

        <!-- 내용 -->
        <div class="statement-section">
            <div class="section-label">내용</div>
            <div class="statement-quote" id="auctionDescription">작품 설명</div>
<!--            <div class="statement-source">이건용, 류한승, 『작가와의 대화』, 『이벤트-로지컬』, 갤러리현대, 2016</div>-->
<!--        </div>-->

        <!-- 작품 정보 그리드 -->
<!--        <div class="work-info-section">-->
<!--            <div class="section-label">작품 정보</div>-->
<!--            <div class="info-grid">-->
<!--                <div class="info-cell">-->
<!--                    <div class="info-cell-label">매체</div>-->
<!--                    <div class="info-cell-value">종이에 아크릴, 색연필</div>-->
<!--                </div>-->
<!--                <div class="info-cell">-->
<!--                    <div class="info-cell-label">크기</div>-->
<!--                    <div class="info-cell-value">20.5 × 29 cm</div>-->
<!--                </div>-->
<!--                <div class="info-cell">-->
<!--                    <div class="info-cell-label">제작 연도</div>-->
<!--                    <div class="info-cell-value">2017</div>-->
<!--                </div>-->
<!--                <div class="info-cell">-->
<!--                    <div class="info-cell-label">상태</div>-->
<!--                    <div class="info-cell-value">우측 하단 서명 · 액자 포함</div>-->
<!--                </div>-->
<!--            </div>-->
        </div>

    </div>

    <!-- ══════════════════════════════
         오른쪽: 경매 입찰 패널
    ══════════════════════════════ -->
    <div class="bid-panel">

        <!-- 패널 헤더 -->
        <div class="panel-header">
            <div class="live-badge">
                <div class="live-dot"></div>
                AUCTION
            </div>
        </div>

        <!-- 마감 카운트다운 -->
        <div class="countdown-wrap">
            <div class="countdown-label">경매 마감까지</div>
            <div class="countdown-timer">
                <div class="cd-unit">
                    <div class="cd-num" id="cdDay">00</div>
                    <div class="cd-lbl">일</div>
                </div>
                <div class="cd-sep">:</div>
                <div class="cd-unit">
                    <div class="cd-num" id="cdHour">00</div>
                    <div class="cd-lbl">시간</div>
                </div>
                <div class="cd-sep">:</div>
                <div class="cd-unit">
                    <div class="cd-num" id="cdMin">00</div>
                    <div class="cd-lbl">분</div>
                </div>
                <div class="cd-sep">:</div>
                <div class="cd-unit">
                    <div class="cd-num" id="cdSec">00</div>
                    <div class="cd-lbl">초</div>
                </div>
            </div>
            <div class="deadline-date" id="auctionDeadlineDate">마감 일정</div>
        </div>

        <!-- 현재 최고가 -->
        <div class="price-section">
            <div class="price-label">현재 최고가</div>
            <div>
                <span class="price-value" id="curPrice">0</span>
                <span class="price-unit">원</span>
            </div>
            <div class="bid-count-row">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <span class="bid-count" id="auctionBidMeta">현재 입찰 <strong id="bidCount">0</strong>명</span>
            </div>
        </div>

        <!-- 입찰 단위 + 금액 조절 -->
        <div class="bid-input-section">
            <div class="bid-input-label">입찰 금액 설정</div>
            <div class="bid-ctrl-wrap">
                <button class="bid-ctrl-btn" type="button" onclick="changeBid(-1)">−</button>
                <div class="bid-amount-display">
                    <span id="bidDisplay">0</span>원
                </div>
                <button class="bid-ctrl-btn" type="button" onclick="changeBid(1)">+</button>
            </div>
            <div class="bid-unit-row">
                <div class="bid-unit-info" id="auctionBidUnit">입찰 단위 <strong>10,000원</strong></div>
                <div class="est-purchase">낙찰 수수료 <strong>포함 예상</strong></div>
            </div>
        </div>

        <!-- 버튼 영역 -->
        <div class="bid-btn-section">
            <button class="btn-bid-main" id="bidActionBtn" type="button" onclick="doBid()">입찰하기</button>
            <div class="btn-row-2">
                <button class="btn-sub">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"></path>
                    </svg>
                    찜하기
                </button>
                <button class="btn-sub" id="deleteWorkBtn" type="button" onclick="deleteAuctionWork()" hidden>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 6h18"></path>
                        <path d="M8 6V4h8v2"></path>
                        <path d="M19 6l-1 14H6L5 6"></path>
                        <path d="M10 11v6"></path>
                        <path d="M14 11v6"></path>
                    </svg>
                    삭제하기
                </button>
            </div>
        </div>

        <!-- 판매자(크리에이터) 정보 -->
<!--        <div class="seller-section">-->
<!--            <div class="seller-row">-->
<!--                <div class="seller-avatar">이</div>-->
<!--                <div class="seller-info">-->
<!--                    <div class="seller-name">이건용</div>-->
<!--                    <div class="seller-sub">진행 중인 경매 4건</div>-->
<!--                </div>-->
<!--                <div class="seller-trust">★ 신뢰</div>-->
<!--            </div>-->
<!--            <div class="seller-btns">-->
<!--                <button class="seller-btn">프로필 보기</button>-->
<!--                <button class="seller-btn">작품 목록</button>-->
<!--                <button class="seller-btn">팔로우</button>-->
<!--            </div>-->
<!--        </div>-->

    </div>

</div>
</div>

<div class="modal-overlay work-share-modal-overlay" id="workShareModal" hidden>
    <div class="work-share-modal" role="dialog" aria-modal="true" aria-label="공유">
        <div class="work-share-modal__header">
            <div class="work-share-modal__spacer"></div>
            <h2 class="work-share-modal__title">공유</h2>
            <button class="work-share-modal__close" id="auctionShareCloseButton" type="button" aria-label="닫기">
                <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                    <polyline fill="none" points="20.643 3.357 12 12 3.353 20.647" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3"></polyline>
                    <line fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="3" x1="20.649" x2="3.354" y1="20.649" y2="3.354"></line>
                </svg>
            </button>
        </div>
        <div class="work-share-modal__receiver">
            <label class="work-share-modal__label" for="workShareSearchInput">받는 사람:</label>
            <div class="work-share-modal__receiver-body">
                <div class="work-share-modal__chips" id="workShareSelectedList"></div>
                <input class="work-share-modal__search" id="workShareSearchInput" type="text" placeholder="검색..." autocomplete="off">
            </div>
        </div>
        <div class="work-share-modal__list" id="workShareRecipientList"></div>
        <div class="work-share-modal__footer">
            <input class="work-share-modal__message" id="workShareMessageInput" type="text" placeholder="메시지 쓰기..." autocomplete="off">
            <button class="work-share-modal__send" id="workShareSendButton" type="button">보내기</button>
        </div>
    </div>
</div>

<script src="/js/auction/auction-detail.js"></script>
<script defer src="/js/main/navigation.js"></script>
</body>
</html>
